## Zitrion Lead Engine - self-hosted Convex stack for Dokploy
## Mirrors the proven tiptoo deployment pattern (backend + dashboard + postgres + admin-key helper).
## Deploy as a Dokploy "Compose" service in the `zitrion-lead-engine` project.
## Set the variables below via the Dokploy Compose Environment tab (see infra/.env.example).

services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      INSTANCE_NAME: ${INSTANCE_NAME:-zitrion-lead-engine}
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      POSTGRES_URL: ${POSTGRES_URL}
      DO_NOT_REQUIRE_SSL: ${DO_NOT_REQUIRE_SSL:-1}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN}
      CONVEX_SITE_URL: ${CONVEX_SITE_ORIGIN}
      DISABLE_METRICS_ENDPOINT: ${DISABLE_METRICS_ENDPOINT:-true}
      DOCUMENT_RETENTION_DELAY: ${DOCUMENT_RETENTION_DELAY:-172800}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - convex_data:/convex/data
    expose:
      - 3210
      - 3211
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3210/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    depends_on:
      convex-postgres:
        condition: service_healthy

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${CONVEX_CLOUD_ORIGIN}
      NEXT_PUBLIC_LOAD_MONACO_INTERNALLY: ${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-true}
    expose:
      - 6791
    restart: unless-stopped
    depends_on:
      convex-backend:
        condition: service_healthy

  ## One-shot helper: prints the self-hosted admin key to its logs.
  ## After first deploy, read this service's logs, copy the key into
  ## CONVEX_SELF_HOSTED_ADMIN_KEY, then run `npx convex deploy` from the repo.
  convex-admin-key:
    image: ghcr.io/get-convex/convex-backend:latest
    entrypoint: ["./generate_admin_key.sh"]
    environment:
      INSTANCE_NAME: ${INSTANCE_NAME:-zitrion-lead-engine}
      INSTANCE_SECRET: ${INSTANCE_SECRET}
    restart: "no"
    depends_on:
      - convex-backend

  convex-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zitrion_lead_engine}
      POSTGRES_USER: ${POSTGRES_USER:-zitrion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - convex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zitrion} -d ${POSTGRES_DB:-zitrion_lead_engine}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  convex_data:
  convex_postgres_data:
